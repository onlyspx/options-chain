upstream spx0_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name spx0.com;
    return 301 https://spx0.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.spx0.com;
    return 301 https://spx0.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.spx0.com;

    ssl_certificate /etc/letsencrypt/live/spx0.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spx0.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://spx0.com$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name spx0.com;

    ssl_certificate /etc/letsencrypt/live/spx0.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spx0.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    location / {
        proxy_pass http://spx0_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }
}
